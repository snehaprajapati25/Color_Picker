<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker Tool</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="box">
        <h2>🎨 Color Picker</h2>

        <div class="tags">
            <span id="spectrumTab">Spectrum</span>
            <!-- <span>Pick Color</span> -->
            <span id="savedTab">Saved</span>
        </div>


        <div class="spectrum-section">
            <!-- to preview color -->
             
            <div class="color-box"></div>

            <!-- hide color picker -->
            <input type="range" id="hue-slider" min="0" max="360" value="0">

            <input type="text" id="hex-code" value="#ff0000" readonly>

            <button id="saveBtn">Save Color</button>
        </div>


        <div class="saved-section">
            <div class="saved-colors"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
